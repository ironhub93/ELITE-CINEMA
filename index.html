<!DOCTYPE html>
<html lang="fr" dir="rtl"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Cinema | Streaming</title>
    <style>
        :root {
            --primary-color: #ca8a04; 
            --accent-color: #7c3aed;  
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            direction: rtl; /* محاذاة الصفحة لليمين */
        }

        /* Header Optimized - No Logo */
        header { 
            background: rgba(15, 23, 42, 0.98); 
            padding: 20px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* محاذاة المحتوى لليمين */
        }

        .search-container {
            display: flex;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        #search-input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 0 25px 25px 0; /* حواف معكوسة لليمين */
            border: 1px solid var(--primary-color); 
            background: #1e293b; 
            color: white; 
            outline: none;
            text-align: right;
        }

        #search-btn { 
            padding: 12px 20px; 
            background: var(--primary-color); 
            border: none; 
            border-radius: 25px 0 0 25px; 
            cursor: pointer;
        }

        .filter-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        select {
            padding: 8px 15px;
            border-radius: 10px;
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            cursor: pointer;
        }

        .nav-tabs { display: flex; gap: 10px; margin-top: 10px; }
        .tab-btn { background: #334155; border: none; color: white; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .tab-btn.active { background: var(--accent-color); font-weight: bold; }

        /* Genres Bar */
        .genres-bar { 
            display: flex; 
            flex-direction: row-reverse; /* ترتيب التصنيفات من اليمين */
            gap: 10px; 
            overflow-x: auto; 
            padding: 12px 20px; 
            background: #111827; 
            scrollbar-width: none; 
        }
        .genres-bar::-webkit-scrollbar { display: none; }
        .genre-pill { 
            background: #1e293b; padding: 7px 16px; border-radius: 20px; 
            font-size: 0.85rem; cursor: pointer; border: 1px solid #334155; white-space: nowrap; 
        }
        .genre-pill.active { background: var(--primary-color); color: #000; }

        /* Grid */
        .movie-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; padding: 20px; 
        }
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; }
        .movie-card img { width: 100%; height: 210px; object-fit: cover; }
        .movie-info { padding: 10px; text-align: center; font-size: 0.8rem; }
        .rating { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: gold; padding: 2px 5px; border-radius: 5px; font-size: 0.7rem; }

        /* Modal & Others */
        #video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; justify-content: center; align-items: flex-start; padding-top: 50px; }
        .modal-content { width: 95%; max-width: 800px; position: relative; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 10px; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .close-modal { position: absolute; top: -40px; left: 0; color: white; font-size: 30px; cursor: pointer; }

        @media (max-width: 600px) { .movie-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Rechercher...">
            <button id="search-btn" onclick="handleSearch()">🔍</button>
        </div>

        <div class="filter-group">
            <select id="year-filter" onchange="fetchContent(true)">
                <option value="">Année (Toutes)</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
        </div>

        <div class="nav-tabs">
            <button id="tab-movie" class="tab-btn active" onclick="setMode('movie')">Films</button>
            <button id="tab-tv" class="tab-btn" onclick="setMode('tv')">Séries</button>
        </div>
    </header>

    <div class="genres-bar" id="genres-bar"></div>

    <main>
        <div class="movie-grid" id="movie-grid"></div>
        <div id="loader" style="text-align:center; padding:20px; display:none;">Chargement...</div>
    </main>

    <div id="video-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closePlayer()">&times;</span>
            <div class="video-wrapper"><iframe id="video-iframe" src="" allowfullscreen></iframe></div>
        </div>
    </div>

    <script>
        const API_KEY = '83bb10aede244d0c9ee71e7eb187b44f';
        let mode = 'movie', page = 1, currentGenreId = '', isFetching = false, searchQuery = '';

        async function loadGenres() {
            const res = await fetch(`https://api.themoviedb.org/3/genre/${mode}/list?api_key=${API_KEY}&language=fr-FR`);
            const data = await res.json();
            const bar = document.getElementById('genres-bar');
            bar.innerHTML = `<div class="genre-pill active" onclick="filterGenre('', this)">Tous</div>`;
            data.genres.forEach(g => {
                bar.innerHTML += `<div class="genre-pill" onclick="filterGenre('${g.id}', this)">${g.name}</div>`;
            });
        }

        function filterGenre(id, el) {
            currentGenreId = id; searchQuery = '';
            document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            fetchContent(true);
        }

        async function fetchContent(reset = false) {
            if (isFetching) return;
            isFetching = true;
            if (reset) { document.getElementById('movie-grid').innerHTML = ''; page = 1; }
            document.getElementById('loader').style.display = 'block';

            const year = document.getElementById('year-filter').value;
            const yearParam = mode === 'movie' ? 'primary_release_year' : 'first_air_date_year';

            let url = searchQuery 
                ? `https://api.themoviedb.org/3/search/${mode}?api_key=${API_KEY}&language=fr-FR&query=${searchQuery}&page=${page}`
                : `https://api.themoviedb.org/3/discover/${mode}?api_key=${API_KEY}&language=fr-FR&sort_by=popularity.desc&page=${page}&with_genres=${currentGenreId}&${yearParam}=${year}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                data.results.forEach(item => {
                    if (!item.poster_path) return;
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.onclick = () => openPlayer(item.id);
                    card.innerHTML = `
                        <div class="rating">★ ${item.vote_average.toFixed(1)}</div>
                        <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                        <div class="movie-info">${item.title || item.name}</div>
                    `;
                    document.getElementById('movie-grid').appendChild(card);
                });
                page++;
            } catch (e) { console.error(e); }
            isFetching = false;
            document.getElementById('loader').style.display = 'none';
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value;
            fetchContent(true);
        }

        function setMode(m) {
            mode = m; searchQuery = ''; currentGenreId = '';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${m}`).classList.add('active');
            loadGenres(); fetchContent(true);
        }

        function openPlayer(id) {
            const embedUrl = mode === 'movie' ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/1/1`;
            document.getElementById('video-iframe').src = embedUrl;
            document.getElementById('video-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('video-modal').style.display = 'none';
            document.getElementById('video-iframe').src = '';
            document.body.style.overflow = 'auto';
        }

        window.onscroll = () => { if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 800) fetchContent(); };

        loadGenres();
        fetchContent();
    </script>
</body>
</html>
